name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  packages: write
  statuses: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2
        with:
          version: "0.11.1"
          python-version: "3.10"

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Install dependencies
        run: |
          uv sync --group dev --group release --all-extras

      - name: Set Package Version
        run: |
          uv version ${GITHUB_REF#refs/*/}

      - name: Build package
        run: |
          uv build
          uv run twine check --strict dist/*

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1.14.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}

      - name: Publish Github release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
